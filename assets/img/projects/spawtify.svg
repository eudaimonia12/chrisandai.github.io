<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f4f2fb"/>
  <rect x="40" y="34" width="720" height="532" rx="16" fill="#ffffff" stroke="#e6e0f5"/>
  <circle cx="66" cy="60" r="5" fill="#ef6a5e"/>
  <circle cx="84" cy="60" r="5" fill="#f4bd4f"/>
  <circle cx="102" cy="60" r="5" fill="#61c554"/>
  <line x1="40" y1="82" x2="760" y2="82" stroke="#eee6f7"/>

  <!-- top bar -->
  <text x="64" y="118" font-size="21" font-weight="800" fill="url(#pg)">Spawtify</text>
  <text x="150" y="118" font-size="11" fill="#a79ec6">Neighbourhood animal sightings</text>
  <rect x="596" y="98" width="132" height="30" rx="15" fill="url(#pg)"/>
  <text x="662" y="118" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">+ Report sighting</text>

  <!-- map -->
  <clipPath id="mapclip"><rect x="64" y="146" width="672" height="400" rx="12"/></clipPath>
  <g clip-path="url(#mapclip)">
    <rect x="64" y="146" width="672" height="400" fill="#eef4ef"/>
    <!-- park blocks -->
    <rect x="90" y="168" width="150" height="120" rx="8" fill="#dcefe0"/>
    <rect x="470" y="360" width="180" height="150" rx="8" fill="#dcefe0"/>
    <!-- water -->
    <path d="M600 146 q40 80 -10 160 q-30 90 60 240 l150 0 0 -400 z" fill="#d7e6f5"/>
    <!-- roads -->
    <line x1="64" y1="260" x2="736" y2="240" stroke="#ffffff" stroke-width="10"/>
    <line x1="64" y1="410" x2="736" y2="430" stroke="#ffffff" stroke-width="10"/>
    <line x1="270" y1="146" x2="300" y2="546" stroke="#ffffff" stroke-width="10"/>
    <line x1="500" y1="146" x2="470" y2="546" stroke="#ffffff" stroke-width="8"/>
    <line x1="64" y1="330" x2="736" y2="340" stroke="#ffffff" stroke-width="6"/>
  </g>
  <rect x="64" y="146" width="672" height="400" rx="12" fill="none" stroke="#e6e0f5"/>

  <!-- roaming area (user-drawn polygon) -->
  <polygon points="150,300 260,250 340,300 320,400 200,420" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- pins -->
  <g>
    <path d="M240 300 c0 -14 -11 -25 -25 -25 c-14 0 -25 11 -25 25 c0 18 25 40 25 40 c0 0 25 -22 25 -40 z" fill="#7c3aed"/>
    <circle cx="215" cy="300" r="11" fill="#ffffff"/>
    <circle cx="215" cy="300" r="5" fill="#7c3aed"/>
  </g>
  <g>
    <path d="M400 235 c0 -12 -9 -21 -21 -21 c-12 0 -21 9 -21 21 c0 15 21 34 21 34 c0 0 21 -19 21 -34 z" fill="#10b981"/>
    <circle cx="379" cy="235" r="9" fill="#ffffff"/>
    <circle cx="379" cy="235" r="4" fill="#10b981"/>
  </g>
  <g>
    <path d="M320 430 c0 -12 -9 -21 -21 -21 c-12 0 -21 9 -21 21 c0 15 21 34 21 34 c0 0 21 -19 21 -34 z" fill="#10b981"/>
    <circle cx="299" cy="430" r="9" fill="#ffffff"/>
    <circle cx="299" cy="430" r="4" fill="#10b981"/>
  </g>
  <g>
    <path d="M560 470 c0 -12 -9 -21 -21 -21 c-12 0 -21 9 -21 21 c0 15 21 34 21 34 c0 0 21 -19 21 -34 z" fill="#f4bd4f"/>
    <circle cx="539" cy="470" r="9" fill="#ffffff"/>
    <circle cx="539" cy="470" r="4" fill="#f4bd4f"/>
  </g>
  <g>
    <path d="M620 210 c0 -12 -9 -21 -21 -21 c-12 0 -21 9 -21 21 c0 15 21 34 21 34 c0 0 21 -19 21 -34 z" fill="#7c3aed"/>
    <circle cx="599" cy="210" r="9" fill="#ffffff"/>
    <circle cx="599" cy="210" r="4" fill="#7c3aed"/>
  </g>

  <!-- sighting popup -->
  <g>
    <rect x="392" y="288" width="196" height="96" rx="12" fill="#ffffff" stroke="#e6e0f5"/>
    <path d="M400 384 l10 0 l-5 12 z" fill="#ffffff" stroke="#e6e0f5"/>
    <rect x="404" y="300" width="56" height="56" rx="10" fill="#ece6fd"/>
    <circle cx="432" cy="322" r="12" fill="#7c3aed"/>
    <circle cx="427" cy="319" r="2.4" fill="#ffffff"/>
    <circle cx="437" cy="319" r="2.4" fill="#ffffff"/>
    <path d="M424 312 l4 6 M440 312 l-4 6" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
    <rect x="418" y="340" width="28" height="7" rx="3.5" fill="#c4b8e8"/>
    <text x="472" y="315" font-size="13" font-weight="700" fill="#191428">Grace the cat</text>
    <rect x="472" y="326" width="96" height="7" rx="3.5" fill="#d9d1ee"/>
    <rect x="472" y="340" width="72" height="7" rx="3.5" fill="#d9d1ee"/>
    <text x="472" y="368" font-size="10" fill="#10b981" font-weight="600">Spotted 20 min ago</text>
  </g>

  <!-- legend chip -->
  <rect x="80" y="164" width="150" height="26" rx="13" fill="#ffffff" stroke="#e6e0f5"/>
  <circle cx="96" cy="177" r="4" fill="#7c3aed"/>
  <text x="106" y="181" font-size="10" fill="#665f7d">Pets</text>
  <circle cx="150" cy="177" r="4" fill="#10b981"/>
  <text x="160" y="181" font-size="10" fill="#665f7d">Wildlife</text>
</svg>
